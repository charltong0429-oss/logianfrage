appId: com.taurisg.logianfrage
productName: LogiAnfrage
copyright: Copyright © 2026

directories:
  output: dist
  buildResources: build

files:
  - out/**/*
  - package.json
  - "!node_modules/**"

mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch: [arm64, x64]
  category: public.app-category.business

win:
  target:
    - target: nsis
      arch: [x64]

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

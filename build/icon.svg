<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#1e3a8a"/>
    </linearGradient>
    <linearGradient id="truck" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="badge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
    <filter id="badgeShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="2" y="2" width="1020" height="1020" rx="222" fill="none"
        stroke="rgba(255,255,255,0.12)" stroke-width="3"/>

  <!-- === TRUCK === (filter for shadow) -->
  <g filter="url(#shadow)">

    <!-- Cargo box body -->
    <rect x="110" y="330" width="540" height="330" rx="22" fill="url(#truck)"/>

    <!-- Cargo door center seam -->
    <line x1="380" y1="330" x2="380" y2="660" stroke="#bfdbfe" stroke-width="7"/>
    <!-- Cargo horizontal ribs -->
    <line x1="110" y1="435" x2="650" y2="435" stroke="#bfdbfe" stroke-width="5" opacity="0.7"/>
    <line x1="110" y1="540" x2="650" y2="540" stroke="#bfdbfe" stroke-width="5" opacity="0.7"/>

    <!-- Cab -->
    <path d="M650 395 L650 660 L820 660 L820 455 C820 440 812 425 798 418 L710 395 Z"
          fill="url(#truck)"/>

    <!-- Cab window -->
    <path d="M668 410 L668 475 L800 475 L800 455 C800 445 795 435 785 430 L710 410 Z"
          fill="#93c5fd" opacity="0.85"/>
    <!-- Window frame -->
    <path d="M668 410 L668 475 L800 475 L800 455 C800 445 795 435 785 430 L710 410 Z"
          fill="none" stroke="#60a5fa" stroke-width="4"/>

    <!-- Cab detail line -->
    <line x1="650" y1="395" x2="710" y2="395" stroke="#93c5fd" stroke-width="4"/>

    <!-- Step / bumper -->
    <rect x="660" y="620" width="140" height="30" rx="8" fill="#bfdbfe"/>

    <!-- Rear bumper -->
    <rect x="112" y="630" width="80" height="20" rx="6" fill="#bfdbfe"/>

  </g>

  <!-- Wheels -->
  <!-- Rear wheel -->
  <circle cx="240" cy="698" r="82" fill="#1e3a8a" stroke="white" stroke-width="18"/>
  <circle cx="240" cy="698" r="36" fill="white" opacity="0.9"/>
  <circle cx="240" cy="698" r="12" fill="#1e3a8a"/>
  <!-- Rear wheel bolts -->
  <circle cx="240" cy="654" r="7" fill="#bfdbfe"/>
  <circle cx="276" cy="669" r="7" fill="#bfdbfe"/>
  <circle cx="276" cy="727" r="7" fill="#bfdbfe"/>
  <circle cx="240" cy="742" r="7" fill="#bfdbfe"/>
  <circle cx="204" cy="727" r="7" fill="#bfdbfe"/>
  <circle cx="204" cy="669" r="7" fill="#bfdbfe"/>

  <!-- Front wheel -->
  <circle cx="690" cy="698" r="72" fill="#1e3a8a" stroke="white" stroke-width="18"/>
  <circle cx="690" cy="698" r="30" fill="white" opacity="0.9"/>
  <circle cx="690" cy="698" r="11" fill="#1e3a8a"/>
  <!-- Front wheel bolts -->
  <circle cx="690" cy="660" r="6" fill="#bfdbfe"/>
  <circle cx="722" cy="672" r="6" fill="#bfdbfe"/>
  <circle cx="722" cy="724" r="6" fill="#bfdbfe"/>
  <circle cx="690" cy="736" r="6" fill="#bfdbfe"/>
  <circle cx="658" cy="724" r="6" fill="#bfdbfe"/>
  <circle cx="658" cy="672" r="6" fill="#bfdbfe"/>

  <!-- Ground shadow line -->
  <ellipse cx="430" cy="790" rx="360" ry="18" fill="rgba(0,0,0,0.25)"/>

  <!-- Route dots below truck -->
  <circle cx="130" cy="840" r="10" fill="white" opacity="0.35"/>
  <circle cx="200" cy="840" r="10" fill="white" opacity="0.35"/>
  <circle cx="270" cy="840" r="10" fill="white" opacity="0.35"/>
  <circle cx="340" cy="840" r="10" fill="white" opacity="0.35"/>
  <circle cx="410" cy="840" r="10" fill="white" opacity="0.35"/>
  <path d="M440 840 L500 840 M480 825 L500 840 L480 855"
        stroke="white" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.45"/>

  <!-- === INQUIRY BADGE (orange circle, top-right) === -->
  <g filter="url(#badgeShadow)">
    <circle cx="790" cy="235" r="118" fill="url(#badge)"/>
    <!-- Inner ring -->
    <circle cx="790" cy="235" r="118" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="4"/>
    <!-- Question mark -->
    <text x="790" y="295"
          font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif"
          font-size="155" font-weight="800"
          fill="white" text-anchor="middle" dominant-baseline="auto"
          letter-spacing="-4">?</text>
  </g>

</svg>
